<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/customer-portal-mockup-wastemart/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WasteMart Customer Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #F3F7F6; }

      /* ── Preloader ── */
      #wm-preloader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 26px; background: #FBFCFC;
        transition: opacity .55s ease;
      }
      #wm-preloader.wm-hide { opacity: 0; pointer-events: none; }
      #wm-preloader .wm-logo {
        height: 60px; width: auto; display: block;
        animation: wm-fade .5s ease both;
      }
      #wm-preloader .wm-spin {
        width: 30px; height: 30px; border-radius: 50%;
        border: 2.5px solid #E4EBEA; border-top-color: #13A89E;
        animation: wm-rot 1s linear infinite;
      }
      #wm-preloader .wm-msg {
        font-family: 'Open Sans', system-ui, sans-serif;
        font-size: 13.5px; font-weight: 500; letter-spacing: 0.2px;
        color: #5F7077; margin: -6px 0 0;
        animation: wm-fade .6s ease both;
      }
      @keyframes wm-rot { to { transform: rotate(360deg); } }
      @keyframes wm-fade { from { opacity: 0; } to { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        #wm-preloader .wm-spin { animation: wm-pulse 1.5s ease-in-out infinite; }
      }
      @keyframes wm-pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    </style>
    <script type="module" crossorigin src="/customer-portal-mockup-wastemart/assets/index-WnYLI7t9.js"></script>
    <link rel="stylesheet" crossorigin href="/customer-portal-mockup-wastemart/assets/index-DnYOZMih.css">
  </head>
  <body>
    <div id="wm-preloader">
      <img class="wm-logo" src="/customer-portal-mockup-wastemart/wastemart-logo.png" alt="WasteMart" />
      <div class="wm-spin" role="status" aria-label="Loading"></div>
      <p class="wm-msg">Preparing your customer portal…</p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var pre = document.getElementById('wm-preloader');
        var rootEl = document.getElementById('root');
        var done = false;
        function hide() {
          if (done || !pre) return;
          done = true;
          pre.classList.add('wm-hide');
          setTimeout(function () { if (pre && pre.parentNode) pre.parentNode.removeChild(pre); }, 650);
        }
        // Hide as soon as the app has mounted its first content — no artificial delay.
        if (rootEl.childElementCount > 0) {
          requestAnimationFrame(hide);
        } else {
          var obs = new MutationObserver(function () {
            if (rootEl.childElementCount > 0) {
              obs.disconnect();
              requestAnimationFrame(function () { requestAnimationFrame(hide); });
            }
          });
          obs.observe(rootEl, { childList: true });
        }
        // Safety fallback so the overlay can never get stuck.
        setTimeout(hide, 8000);
      })();
    </script>
  </body>
</html>
